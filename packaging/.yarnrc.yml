nodeLinker: node-modules
# Skip install-time lifecycle scripts (postinstall etc.) for all packages.
# The three packages that require native compilation (better-sqlite3, keytar,
# cpu-features) are pulled in by Backstage backend internals but are not
# needed to build or export the Kuadrant dynamic plugins. Platform-specific
# binaries for build tools (esbuild, @swc/core) are fetched as regular
# packages by cachi2 and do not rely on their install scripts.
enableScripts: false
enableGlobalCache: true
supportedArchitectures:
  cpu:
    - x64
  os:
    - linux
